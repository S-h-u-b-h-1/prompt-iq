<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PromptIQ Optimizer Test Harness</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    textarea { width: 100%; height: 120px; margin-bottom: 12px; }
    input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 12px; }
    button { padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    .error { color: #cc0000; font-weight: bold; }
  </style>
</head>
<body>
  <h2>PromptIQ Optimizer Test Harness</h2>
  
  <label for="apiKey">Anthropic API Key:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />

  <label for="prompt">Prompt to Optimize:</label>
  <textarea id="prompt">write a cold email for sales</textarea>

  <label for="platform">Platform:</label>
  <select id="platform" style="margin-bottom: 12px; display: block; padding: 6px;">
    <option value="ChatGPT">ChatGPT</option>
    <option value="Claude">Claude</option>
    <option value="Gemini">Gemini</option>
  </select>

  <button id="optimizeBtn">Optimize</button>

  <h3>Result:</h3>
  <pre id="output">Click Optimize to test...</pre>

  <script type="module">
    import { optimizePrompt } from './src/lib/optimizer.js';

    document.getElementById('optimizeBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value.trim();
      const prompt = document.getElementById('prompt').value;
      const platform = document.getElementById('platform').value;
      const output = document.getElementById('output');

      output.textContent = 'Optimizing...';
      output.className = '';

      if (!apiKey) {
        output.textContent = 'Error: Please provide an API key.';
        output.className = 'error';
        return;
      }

      try {
        const result = await optimizePrompt(apiKey, prompt, platform);
        output.textContent = JSON.stringify(result, null, 2);
      } catch (err) {
        output.textContent = `Error: ${err.message}`;
        output.className = 'error';
      }
    });
  </script>
</body>
</html>
